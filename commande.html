<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Gestion commandes

</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{

--blue:#111827;
--gold:#d4a24c;
--white:#ffffff;
--light:#f5f5f5;
--black:#121212;

}

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

background:var(--light);

padding:30px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.logo{

font-size:28px;

font-weight:bold;

color:var(--blue);

}

.logo span{

display:block;

font-size:13px;

color:var(--gold);

}

.search{

padding:15px;

width:300px;

border-radius:15px;

border:none;

outline:none;

}

.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:20px;

margin-bottom:30px;

}

.statCard{

background:white;

padding:25px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

}

.statCard h2{

font-size:35px;

margin-top:10px;

}

.orders{

display:grid;

gap:20px;

}

.orderCard{

background:white;

padding:25px;

border-radius:20px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

animation:show .5s;

}

@keyframes show{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.buttons{

display:flex;

gap:10px;

flex-wrap:wrap;

margin-top:20px;

}

.btn{

padding:12px 18px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

}

.valider{

background:green;
color:white;

}

.refuser{

background:red;
color:white;

}

.rupture{

background:#444;
color:white;

}

.supprimer{

background:#111827;
color:white;

}

.pending{

color:orange;
font-weight:bold;

}

.valid{

color:green;
font-weight:bold;

}

.refused{

color:red;
font-weight:bold;

}

.stock{

color:#444;
font-weight:bold;

}

</style>

</head>

<body>

<div class="header">

<div class="logo">

Commandes

<span>

Pasteur Antonin Ahoulou

</span>

</div>

<input
class="search"
id="searchInput"
placeholder="Rechercher...">

</div>



<div class="stats">

<div class="statCard">

<p>Total</p>

<h2 id="total">

0

</h2>

</div>

<div class="statCard">

<p>En attente</p>

<h2 id="attente">

0

</h2>

</div>

<div class="statCard">

<p>Validées</p>

<h2 id="valide">

0

</h2>

</div>

<div class="statCard">

<p>Refusées</p>

<h2 id="refuse">

0

</h2>

</div>

<div class="statCard">

<p>Rupture stock</p>

<h2 id="rupture">

0

</h2>

</div>

</div>


<div
class="orders"
id="orders">

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
deleteDoc

}

from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyApK7qLdTEyJ-nUICEBwyAsDU9QMSdhLEY",

authDomain:"eveil-spirituel-f5020.firebaseapp.com",

databaseURL:"https://eveil-spirituel-f5020-default-rtdb.firebaseio.com",

projectId:"eveil-spirituel-f5020",

storageBucket:"eveil-spirituel-f5020.firebasestorage.app",

messagingSenderId:"382232216617",

appId:"1:382232216617:web:5db2d2953d3f16f0dac838",

measurementId:"G-7B1PPFGZYR"

};


const app=

initializeApp(
firebaseConfig
);

const db=

getFirestore(
app
);


const commandeRef=

collection(
db,
"commandes"
);


let commandes=[];



onSnapshot(

commandeRef,

(snapshot)=>{


commandes=[];


snapshot.forEach(docu=>{

commandes.push({

id:docu.id,

...docu.data()

});

});


renderCommandes();

updateStats();

}

);
function renderCommandes(search=""){


orders.innerHTML="";


commandes

.filter(c=>{

return (

(c.nom||"")
.toLowerCase()

.includes(
search.toLowerCase()
)

||

(c.livre||"")
.toLowerCase()

.includes(
search.toLowerCase()
)

);

})

.forEach(c=>{


let color="pending";


if(
c.statut==="Commande validée"
){

color="valid";

}


if(
c.statut==="Commande refusée"
){

color="refused";

}


if(
c.statut==="Rupture de stock"
){

color="stock";

}



orders.innerHTML+=`

<div class="orderCard">

<h3>

${c.nom}
${c.prenom}

</h3>

<br>

<p>

📞
${c.telephone}

</p>

<p>

📍
${c.quartier}

</p>

<p>

📚
${c.livre}

</p>

<p>

🔢 Quantité :
${c.quantite}

</p>

<p>

💰
${c.prixTotal}
FCFA

</p>

<p>

📅
${c.date}

</p>

<br>

<p class="${color}">

${c.statut}

</p>


<div class="buttons">

<button
class="btn valider"
onclick="valider('${c.id}')">

Valider

</button>


<button
class="btn refuser"
onclick="refuser('${c.id}')">

Refuser

</button>


<button
class="btn rupture"
onclick="rupture('${c.id}')">

Rupture stock

</button>


<button
class="btn supprimer"
onclick="supprimer('${c.id}')">

Supprimer

</button>

</div>

</div>

`;

});

}



function updateStats(){


total.innerText=

commandes.length;


attente.innerText=

commandes.filter(

x=>x.statut==="En attente"

).length;


valide.innerText=

commandes.filter(

x=>x.statut==="Commande validée"

).length;


refuse.innerText=

commandes.filter(

x=>x.statut==="Commande refusée"

).length;


rupture.innerText=

commandes.filter(

x=>x.statut==="Rupture de stock"

).length;

}



window.valider=

async(id)=>{


await updateDoc(

doc(
db,
"commandes",
id
),

{

statut:
"Commande validée"

}

);

};



window.refuser=

async(id)=>{


await updateDoc(

doc(
db,
"commandes",
id
),

{

statut:
"Commande refusée"

}

);

};



window.rupture=

async(id)=>{


await updateDoc(

doc(
db,
"commandes",
id
),

{

statut:
"Rupture de stock"

}

);

};



window.supprimer=

async(id)=>{


if(

confirm(

"Supprimer cette commande ?"

)

){

await deleteDoc(

doc(
db,
"commandes",
id
)

);

}

};



searchInput

.addEventListener(

"input",

()=>{

renderCommandes(

searchInput.value

);

}

);

</script>

</body>

</html>
