<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Admin | Pasteur Antonin Ahoulou

</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{

--blue:#111827;
--gold:#d4a24c;
--white:#ffffff;
--light:#f5f5f5;
--black:#121212;

}

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

background:var(--light);

overflow-x:hidden;

}

.loginScreen{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:

linear-gradient(
135deg,
#111827,
#0f172a
);

display:flex;

justify-content:center;
align-items:center;

z-index:9999;

}

.loginBox{

width:90%;
max-width:420px;

padding:40px;

background:white;

border-radius:25px;

text-align:center;

box-shadow:
0 20px 50px rgba(0,0,0,.2);

animation:show .7s;

}

@keyframes show{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:translateY(0);

}

}

.loginBox i{

font-size:50px;

color:var(--gold);

margin-bottom:20px;

}

.loginBox h2{

margin-bottom:20px;

color:var(--blue);

}

.loginBox input{

width:100%;

padding:15px;

border-radius:15px;

border:1px solid #ddd;

margin-top:20px;

outline:none;

}

.loginBtn{

width:100%;

margin-top:20px;

padding:15px;

border:none;

border-radius:15px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

}

.dashboard{

display:none;

padding:40px;

}

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:40px;

}

.logo{

font-size:28px;

font-weight:bold;

color:var(--blue);

}

.logo span{

display:block;

font-size:12px;

color:var(--gold);

}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:25px;

}

.card{

background:white;

padding:30px;

border-radius:25px;

box-shadow:
0 10px 25px rgba(0,0,0,.08);

transition:.4s;

cursor:pointer;

}

.card:hover{

transform:
translateY(-7px);

}

.card i{

font-size:35px;

color:var(--gold);

margin-bottom:15px;

}

.card h2{

font-size:35px;

margin-bottom:10px;

}

@media(max-width:900px){

.header{

flex-direction:column;
gap:20px;

}

}

</style>

</head>

<body>

<div
class="loginScreen"
id="loginScreen">

<div class="loginBox">

<i class="fa-solid fa-shield-halved"></i>

<h2>

Accès Administrateur

</h2>

<p>

Entrez le mot de passe

</p>

<input
id="password"
type="password"
placeholder="Mot de passe">

<button
class="loginBtn"
onclick="login()">

Connexion

</button>

</div>

</div>


<div
class="dashboard"
id="dashboard">

<div class="header">

<div class="logo">

ADMIN

<span>

Pasteur Antonin Ahoulou

</span>

</div>

</div>
<div class="cards">


<div
class="card"
onclick="window.location.href='commande.html'">

<i class="fa-solid fa-cart-shopping"></i>

<h2 id="commandesCount">

0

</h2>

<p>

Commandes

</p>

</div>




<div
class="card"
onclick="openMessages()">

<i class="fa-solid fa-envelope"></i>

<h2 id="mpCount">

0

</h2>

<p>

Messages privés (MP)

</p>

</div>




<div
class="card"
onclick="window.location.href='temoignages.html'">

<i class="fa-solid fa-comments"></i>

<h2 id="temoignagesCount">

0

</h2>

<p>

Témoignages

</p>

</div>




<div
class="card"
onclick="window.location.href='livres.html'">

<i class="fa-solid fa-book-bible"></i>

<h2>

3

</h2>

<p>

Livres publiés

</p>

</div>




<div
class="card"
onclick="window.location.href='map.html'">

<i class="fa-solid fa-location-dot"></i>

<h2>

📍

</h2>

<p>

Localisation

</p>

</div>




<div
class="card"
onclick="refreshData()">

<i class="fa-solid fa-chart-line"></i>

<h2 id="visitesCount">

0

</h2>

<p>

Activités

</p>

</div>


</div>



<br><br>



<div
style="
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
">

<h2
style="
margin-bottom:20px;
color:#111827;
">

Activité récente

</h2>


<div
id="activityLog">

<p>

Chargement...

</p>

</div>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";

import {

getFirestore,
collection,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyApK7qLdTEyJ-nUICEBwyAsDU9QMSdhLEY",
authDomain:"eveil-spirituel-f5020.firebaseapp.com",
databaseURL:"https://eveil-spirituel-f5020-default-rtdb.firebaseio.com",
projectId:"eveil-spirituel-f5020",
storageBucket:"eveil-spirituel-f5020.firebasestorage.app",
messagingSenderId:"382232216617",
appId:"1:382232216617:web:5db2d2953d3f16f0dac838",
measurementId:"G-7B1PPFGZYR"

};


const app=

initializeApp(
firebaseConfig
);

const db=

getFirestore(
app
);


window.login=()=>{

let password=

document.getElementById(
"password"
).value;


if(password==="0000"){

document.getElementById(
"loginScreen"
).style.display="none";


document.getElementById(
"dashboard"
).style.display="block";


loadRealtime();

}

else{

alert(
"Mot de passe incorrect"
);

}

};



function loadRealtime(){


onSnapshot(

collection(
db,
"commandes"
),

(snapshot)=>{


document.getElementById(
"commandesCount"
).innerText=

snapshot.size;


let html="";


snapshot.forEach(doc=>{

let d=
doc.data();


html+=`

<div style="
padding:12px;
margin-top:10px;
background:#f5f5f5;
border-radius:12px;
">

<b>

${d.nom||""}

</b>

-

${d.livre||""}

<br>

<span style="color:#666">

${d.date||""}

</span>

</div>

`;

});


document.getElementById(
"activityLog"
).innerHTML=

html || "Aucune activité";

});


onSnapshot(

collection(
db,
"temoignages"
),

(snapshot)=>{

document.getElementById(
"temoignagesCount"
).innerText=

snapshot.size;

});


document.getElementById(
"mpCount"
).innerText=

0;


document.getElementById(
"visitesCount"
).innerText=

Math.floor(
Math.random()*1000
);

}



window.openMessages=()=>{

alert(

"Système de messages privés bientôt disponible"

);

};



window.refreshData=()=>{

location.reload();

};

</script>

</div>

</body>

</html>
