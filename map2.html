<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>

Carte | Position du propriétaire

</title>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{

--blue:#111827;
--gold:#d4a24c;
--white:#ffffff;
--light:#f5f5f5;

}

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;

}

body{

background:#f5f5f5;

overflow:hidden;

}

header{

height:80px;

background:#111827;

display:flex;

justify-content:space-between;
align-items:center;

padding:0 5%;

color:white;

box-shadow:

0 5px 20px rgba(0,0,0,.1);

}

.logo{

font-size:24px;
font-weight:bold;

}

.logo span{

display:block;

font-size:12px;

color:#d4a24c;

}

.main{

display:grid;

grid-template-columns:
300px 1fr;

height:calc(100vh - 80px);

}

.sidebar{

background:white;

padding:25px;

overflow:auto;

box-shadow:

0 10px 30px rgba(0,0,0,.08);

z-index:5;

}

.infoCard{

background:#f5f5f5;

padding:20px;

border-radius:20px;

margin-bottom:20px;

}

.infoCard h3{

margin-bottom:10px;

color:#111827;

}

.distance{

font-size:32px;

font-weight:bold;

color:#d4a24c;

}

.routeBtn{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:15px;

cursor:pointer;

font-weight:bold;

background:#d4a24c;

color:white;

transition:.4s;

}

.routeBtn:hover{

transform:translateY(-4px);

}

#map{

width:100%;
height:100%;

}

@media(max-width:900px){

.main{

grid-template-columns:1fr;

}

.sidebar{

height:250px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

Localisation

<span>

Pasteur Antonin Ahoulou

</span>

</div>

</header>


<div class="main">

<div class="sidebar">

<div class="infoCard">

<h3>

📍 Position actuelle

</h3>

<p id="ownerAddress">

Chargement...

</p>

</div>



<div class="infoCard">

<h3>

Distance jusqu'au propriétaire

</h3>

<div
class="distance"
id="distance">

...

</div>

</div>


<button
class="routeBtn"
id="routeBtn">

Voir itinéraire

</button>

</div>


<div id="map"></div>

</div>
<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">

</script>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";

import {

getFirestore,
doc,
onSnapshot

}

from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";


const firebaseConfig={

apiKey:"AIzaSyApK7qLdTEyJ-nUICEBwyAsDU9QMSdhLEY",

authDomain:"eveil-spirituel-f5020.firebaseapp.com",

databaseURL:"https://eveil-spirituel-f5020-default-rtdb.firebaseio.com",

projectId:"eveil-spirituel-f5020",

storageBucket:"eveil-spirituel-f5020.firebasestorage.app",

messagingSenderId:"382232216617",

appId:"1:382232216617:web:5db2d2953d3f16f0dac838",

measurementId:"G-7B1PPFGZYR"

};


const app=

initializeApp(
firebaseConfig
);

const db=

getFirestore(
app
);


const map=

L.map("map")
.setView([0.3901,9.4544],13);


L.tileLayer(

"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",

{

attribution:
"© OpenStreetMap"

}

)

.addTo(map);


let ownerMarker;
let clientMarker;

let ownerLat;
let ownerLng;


const locationDoc=

doc(
db,
"localisation",
"position"
);
window.calculateDistance=(lat1,lon1,lat2,lon2)=>{

const R=6371;

const dLat=
(lat2-lat1)*Math.PI/180;

const dLon=
(lon2-lon1)*Math.PI/180;


const a=

Math.sin(dLat/2)
*
Math.sin(dLat/2)

+

Math.cos(
lat1*Math.PI/180
)

*

Math.cos(
lat2*Math.PI/180
)

*

Math.sin(dLon/2)

*

Math.sin(dLon/2);


const c=

2*
Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return (R*c).toFixed(2);

};



onSnapshot(

locationDoc,

(snapshot)=>{


if(!snapshot.exists()){

document
.getElementById(
"ownerAddress"
)

.innerHTML=

"Aucune position disponible";

return;

}


const data=

snapshot.data();


ownerLat=
data.latitude;

ownerLng=
data.longitude;



document
.getElementById(
"ownerAddress"
)

.innerHTML=

`
Latitude :
${ownerLat}

<br><br>

Longitude :
${ownerLng}

<br><br>

Mise à jour :
${data.date}
`;



if(ownerMarker){

map.removeLayer(
ownerMarker
);

}


ownerMarker=

L.marker(

[
ownerLat,
ownerLng
]

)

.addTo(map)

.bindPopup(

"📍 Position actuelle du propriétaire"

)

.openPopup();



map.setView(

[
ownerLat,
ownerLng
],

13

);



navigator
.geolocation
.getCurrentPosition(

(position)=>{


const clientLat=

position.coords.latitude;

const clientLng=

position.coords.longitude;



if(clientMarker){

map.removeLayer(
clientMarker
);

}



clientMarker=

L.marker(

[
clientLat,
clientLng
]

)

.addTo(map)

.bindPopup(

"Vous êtes ici"

);



L.polyline(

[

[
clientLat,
clientLng
],

[
ownerLat,
ownerLng
]

]

)

.addTo(map);



let distance=

calculateDistance(

clientLat,
clientLng,
ownerLat,
ownerLng

);


document
.getElementById(
"distance"
)

.innerText=

distance+
" km";

}

);

});




document
.getElementById(
"routeBtn"
)

.onclick=()=>{


window.open(

`https://www.google.com/maps/dir/?api=1&destination=${ownerLat},${ownerLng}`

);

};

</script>

</body>

</html>
